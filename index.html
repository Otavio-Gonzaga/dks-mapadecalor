<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>DarkSpot - Painel Operacional</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-primary: #030712;       
            --bg-surface: #0b1528;       
            --accent-blue: #1d4ed8;      
            --accent-yellow: #f59e0b;    
            --text-main: #f8fafc;        
            --text-muted: #94a3b8;
            
            --color-baixo: #10b981;
            --color-moderado: #f59e0b;
            --color-critico: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: rgba(11, 21, 40, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 0.8rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid rgba(29, 78, 216, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            z-index: 2000;
        }

        @media (min-width: 768px) {
            header {
                flex-direction: row;
                padding: 0.8rem 2.5rem;
            }
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-logo {
            height: 45px; 
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(29, 78, 216, 0.5));
        }

        header h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        header h1 span {
            color: var(--accent-blue);
        }

        header p {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(3, 7, 18, 0.6);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        #map-container {
            flex: 1;
            position: relative;
            width: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
            background-color: var(--bg-primary);
        }

        .legenda {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(11, 21, 40, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(29, 78, 216, 0.2);
            width: 90%;
            max-width: 500px;
        }

        @media (min-width: 480px) {
            .legenda { width: auto; }
        }

        .legenda-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-main);
        }

        .circulo {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .verde { background-color: var(--color-baixo); box-shadow: 0 0 10px var(--color-baixo); }
        .amarelo { background-color: var(--color-moderado); box-shadow: 0 0 10px var(--color-moderado); }
        .vermelho { background-color: var(--color-critico); box-shadow: 0 0 10px var(--color-critico); }

        /* Estilização dos Balões Informativos (Popups) */
        .leaflet-popup-content-wrapper {
            background: var(--bg-surface) !important;
            backdrop-filter: blur(12px);
            color: var(--text-main) !important;
            border-radius: 14px !important;
            padding: 4px !important;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.7) !important;
        }
        
        .popup-baixo { border: 1.5px solid var(--color-baixo); }
        .popup-moderado { border: 1.5px solid var(--color-moderado); }
        .popup-critico { border: 1.5px solid var(--color-critico); }

        .leaflet-popup-tip { background: var(--bg-surface) !important; }
        
        .popup-container {
            padding: 10px;
            min-width: 240px;
            font-size: 13px;
            line-height: 1.6;
        }

        .popup-titulo { 
            font-size: 14px;
            font-weight: 800; 
            margin-bottom: 10px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            padding-bottom: 6px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .popup-titulo.b { color: var(--color-baixo); }
        .popup-titulo.m { color: var(--color-moderado); }
        .popup-titulo.c { color: var(--color-critico); }

        .popup-container b {
            color: var(--text-muted);
            font-weight: 500;
        }

        .caixa-melhoria {
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.04);
            border-left: 3px solid var(--accent-blue);
            border-radius: 4px;
            font-size: 12px;
            color: #e2e8f0;
        }
        
        .caixa-melhoria strong {
            color: var(--accent-yellow);
            display: block;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <img src="image_e716e2.png" alt="DarkSpot Logo" class="brand-logo" onerror="this.style.display='none';">
            <h1>Dark<span>Spot</span></h1>
        </div>
        <p id="status-conexao">Conectando ao banco de dados...</p>
    </header>

    <div id="map-container">
        <div id="map"></div>

        <div class="legenda">
            <div class="legenda-item"><span class="circulo verde"></span><span>Baixo (≤ 3)</span></div>
            <div class="legenda-item"><span class="circulo amarelo"></span><span>Moderado (≤ 5)</span></div>
            <div class="legenda-item"><span class="circulo vermelho"></span><span>Crítico (> 8)</span></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnLJGal3lGflJELCQpC8OhCKQXTnHSWLc",
            authDomain: "darkspot-bd.firebaseapp.com",
            projectId: "darkspot-bd",
            storageBucket: "darkspot-bd.firebasestorage.app",
            messagingSenderId: "814754623005",
            appId: "1:814754623005:web:94fb38a572712c06b560f4"
        };

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            const map = L.map('map', { 
                zoomControl: false,
                preferCanvas: false // Desativado Canvas para forçar a renderização em camadas DOM (melhora detecção de clique)
            }).setView([-23.9551, -46.3974], 14);
            
            L.control.zoom({ position: 'topright' }).addTo(map);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 18,
                minZoom: 11
            }).addTo(map);

            let camadaCalor = null;
            
            // CORREÇÃO: Forçando os marcadores invisíveis a ficarem na frente (z-index maior)
            let marcadoresClique = L.layerGroup().addTo(map);

            onSnapshot(collection(db, "ocorrencias"), (snapshot) => {
                const listaOcorrencias = [];
                document.getElementById("status-conexao").innerText = `Painel Ativo • Registros Computados: ${snapshot.size}`;

                snapshot.forEach((doc) => {
                    const dados = doc.data();
                    if (dados.localizacao && dados.localizacao.latitude) {
                        listaOcorrencias.push({
                            lat: dados.localizacao.latitude,
                            lng: dados.localizacao.longitude,
                            descricao: escapeHTML(dados.descricao || "Furtos diversos na região"),
                            periodo: escapeHTML(dados.periodo || "Não informado")
                        });
                    }
                });

                requestAnimationFrame(() => {
                    processarEExibirMapa(listaOcorrencias);
                });
            }, (erro) => {
                document.getElementById("status-conexao").innerText = "Erro na sincronização de dados.";
            });

            function processarEExibirMapa(ocorrencias) {
                if (camadaCalor) map.removeLayer(camadaCalor);
                marcadoresClique.clearLayers();

                if (ocorrencias.length === 0) return;

                const agrupamento = {};
                ocorrencias.forEach(item => {
                    const chaveRegiao = item.lat.toFixed(3) + ',' + item.lng.toFixed(3);
                    if (!agrupamento[chaveRegiao]) agrupamento[chaveRegiao] = [];
                    agrupamento[chaveRegiao].push(item);
                });

                const pontosDeCalor = [];

                for (let chave in agrupamento) {
                    const listaDeCrimes = agrupamento[chave];
                    const quantidade = listaDeCrimes.length;
                    
                    let pesoIntensidade = 0.2;
                    let statusTexto = "Área de Baixo Risco";
                    let classeTema = "b";
                    let classePopup = "popup-baixo";
                    let recomendacao = "";

                    const contagemPeriodos = {};
                    listaDeCrimes.forEach(c => {
                        contagemPeriodos[c.periodo] = (contagemPeriodos[c.periodo] || 0) + 1;
                    });
                    let periodoMaisFrequente = Object.keys(contagemPeriodos).reduce((a, b) => contagemPeriodos[a] > contagemPeriodos[b] ? a : b);

                    if (quantidade <= 3) {
                        pesoIntensidade = 0.2;
                        statusTexto = "Área de Baixo Risco";
                        classeTema = "b";
                        classePopup = "popup-baixo";
                        recomendacao = "Manter atenção rotineira básica ao trafegar portando objetos de valor visíveis.";
                    } 
                    else if (quantidade <= 5) {
                        pesoIntensidade = 0.5;
                        statusTexto = "Atenção: Risco Moderado";
                        classeTema = "m";
                        classePopup = "popup-moderado";
                        recomendacao = "Recomenda-se evitar rotas isoladas ou caminhar sozinho nesta área durante o período mapeado.";
                    } 
                    else if (quantidade > 8) {
                        pesoIntensidade = 1.0;
                        statusTexto = "Alerta: Zona Crítica";
                        classeTema = "c";
                        classePopup = "popup-critico";
                        recomendacao = "ZONAS RECORRENTES: Alto índice de reincidência. Sugere-se reforço de policiamento e iluminação pública.";
                    }
                    else {
                        pesoIntensidade = 0.75;
                        statusTexto = "Risco Elevado";
                        classeTema = "c";
                        classePopup = "popup-critico";
                        recomendacao = "Evitar paradas prolongadas em veículos ou pontos de ônibus sem movimentação comercial ativa.";
                    }

                    const centroLat = listaDeCrimes[0].lat;
                    const centroLng = listaDeCrimes[0].lng;

                    pontosDeCalor.push([centroLat, centroLng, pesoIntensidade]);

                    // CORREÇÃO: Aumentado o raio de colisão do clique para 35 e adicionada borda ativa invisível para facilitar o toque
                    const areaClicavel = L.circleMarker([centroLat, centroLng], {
                        radius: 35,                     // Aumentado para cobrir toda a mancha de calor
                        fillColor: '#000',
                        fillOpacity: 0.0,               // Totalmente transparente por dentro
                        color: 'transparent',           
                        weight: 5,                      // Área extra de aproximação
                        interactive: true
                    }).addTo(marcadoresClique);

                    // CORREÇÃO: Forçar o cursor do mouse a virar "mãozinha" ao passar sobre a mancha
                    areaClicavel.on('mouseover', function() {
                        this.getElement().style.cursor = 'pointer';
                    });

                    const conteudoPopup = `
                        <div class="popup-container">
                            <div class="popup-titulo ${classeTema}">${statusTexto}</div>
                            <b>Total de Registros:</b> <span style="color:var(--text-main); font-weight:700;">${quantidade} casos</span><br>
                            <b>Período Crítico:</b> <span style="color:var(--accent-yellow); font-weight:600;">${periodoMaisFrequente}</span><br>
                            <b>Último Alerta:</b> ${listaDeCrimes[0].descricao}<br>
                            
                            <div class="caixa-melhoria">
                                <strong>Sugestão de Prevenção / Melhoria:</strong>
                                ${recomendacao}
                            </div>
                        </div>
                    `;

                    areaClicavel.bindPopup(conteudoPopup, { 
                        className: classePopup,
                        closeButton: false,
                        autoPan: true 
                    });
                }

                // A camada de calor é desenhada abaixo dos marcadores clicáveis
                camadaCalor = L.heatLayer(pontosDeCalor, {
                    radius: 40,
                    blur: 25,
                    maxZoom: 16,
                    gradient: {
                        0.2: '#10b981', 
                        0.5: '#f59e0b', 
                        1.0: '#ef4444'  
                    }
                }).addTo(map);

                // Garante a ordem: Marcadores de clique sempre em cima da pintura térmica
                marcadoresClique.bringToFront();
            }

        } catch (e) {
            console.error(e);
        }
    </script>
</body>
</html>
